[pytest]
# Pytest configuration for qneural

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for categorizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests

# Default test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short

# Ignore directories
norecursedirs = .git .github __pycache__ *.egg-info dist build docs examples temp_reports
